---
name: Build image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag for image
        default: latest
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    name: "Build Image slurm-small-sim:${{ inputs.tag }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          tags: ghcr.io/zckv/slurm-small-sim:${{ inputs.tag }}
          push: true
