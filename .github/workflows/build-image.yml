---
name: Build image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag for image
        default: latest
        type: string
      slurm_version:
        description: Slurm version to build
        default: 25.05.8
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    name: "Build Image slurm-small-sim:${{ inputs.tag }}"
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            SLURM_VERSION=${{ inputs.slurm_version }}
          tags: ghcr.io/zckv/slurm-small-sim:${{ inputs.tag }}
          push: true
